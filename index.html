<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolce-Rhea</title>

  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20260317-2">
</head>

<body>
  <!-- =========================
       Hero
  ========================= -->
  <section class="hero">
    <h1>Dolce-Rhea</h1>
    <p>Reflecting on my life — "If" and "Lie".</p>
  </section>

  <!-- =========================
       Garage
  ========================= -->
  <section class="garage-section" id="garage">
    <div class="garage-slider">
      <p class="section-label garage-label">Garage</p>

      <div class="garage-content">
        <button class="garage-arrow left" id="prevCar" aria-label="前の車へ">&#10094;</button>
        <button class="garage-arrow right" id="nextCar" aria-label="次の車へ">&#10095;</button>

        <div class="garage-stage" id="garageStage"></div>

        <div class="garage-dots" id="garageDots" aria-label="スライドナビゲーション"></div>
      </div>
    </div>
  </section>

  <!-- =========================
       Links
  ========================= -->
  <section class="links-section">
    <div class="links-inner">
      <div class="section-label links-label">Links</div>

      <div class="links-grid">
        <a href="https://github.com/dolceWFC" target="_blank" rel="noopener noreferrer" class="link-card">
          <span class="link-name">GitHub</span>
          <span class="link-desc">Code, projects, and repositories</span>
        </a>

        <a href="https://x.com/rhea_rue_" target="_blank" rel="noopener noreferrer" class="link-card">
          <span class="link-name">Twitter</span>
          <span class="link-desc">Thoughts, updates, and daily notes</span>
        </a>

        <a href="https://tsukubanyan.racing/" target="_blank" rel="noopener noreferrer" class="link-card">
          <span class="link-name">HP</span>
          <span class="link-desc">Related site and external page</span>
        </a>

        <a href="#" class="link-card">
          <span class="link-name">Blog</span>
          <span class="link-desc">Articles and writing archive</span>
        </a>
      </div>
    </div>
  </section>

  <!-- =========================
       Contact
  ========================= -->
  <section class="contact-section">
    <div class="section-label contact-label">Contact</div>

    <form id="contactForm" class="contact-form">
      <label>
        Name
        <input type="text" name="name" required>
      </label>

      <label>
        Email
        <input type="email" name="_replyto" required>
      </label>

      <label>
        Message
        <textarea name="message" rows="6" required></textarea>
      </label>

      <button type="submit">Send</button>
    </form>

    <div id="formMessage">Thank you! Your message has been sent.</div>
  </section>

  <!-- =========================
       Footer
  ========================= -->
  <footer>
    <div>© <span id="year"></span> Dolce-Rhea</div>
  </footer>

  <script src="js/script.js?v=20260317-2"></script>


</body>

</html>
