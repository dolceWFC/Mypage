<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dolce-Rhea</title>
  <meta name="description" content="Dolceの個人サイト">

  <!-- OGP -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Dolce-Rhea">
  <meta property="og:description" content="Dolceの個人サイト。">
  <meta property="og:url" content="https://dolce-rhea.live/">
  <meta property="og:site_name" content="Dolce-Rhea">
  <meta property="og:image" content="https://dolce-rhea.live/images/ogp.jpg">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">

  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="hero">
  <h1>Dolce-Rhea</h1>
  <p>Reflecting on my life — "If" and "Lie".</p>
</section>

<!-- ===== Garage ===== -->
<section class="garage-section" id="garage">
  <div class="garage-slider">

    <div class="section-label">
      GARAGE
      <span class="section-sub">現在所有している車たち</span>
    </div>

    <div class="garage-content">
      <button class="garage-arrow left" id="prevCar">&#10094;</button>
      <button class="garage-arrow right" id="nextCar">&#10095;</button>

      <div class="garage-stage" id="garageStage"></div>
      <div class="garage-dots" id="garageDots"></div>
    </div>
  </div>
</section>

<!-- ===== Archive ===== -->
<section class="garage-section garage-archive-section">
  <div class="garage-slider">

    <div class="section-label">
      GARAGE-ARCHIVE
      <span class="section-sub">過去に乗っていた車たちの記録。</span>
    </div>

    <div class="garage-content">
      <button class="garage-arrow left" id="prevArchive">&#10094;</button>
      <button class="garage-arrow right" id="nextArchive">&#10095;</button>

      <div class="garage-stage" id="archiveStage"></div>
      <div class="garage-dots" id="archiveDots"></div>
    </div>
  </div>
</section>

<!-- ===== Links ===== -->
<section class="links-section">
  <div class="links-inner">
    <div class="section-label">
      LINKS
      <span class="section-sub">SNS等のリンク集</span>
    </div>
    <div class="links-grid" id="linksGrid"></div>
  </div>
</section>

<!-- ===== Contact ===== -->
<section class="contact-section">
  <div class="contact-inner">
    <div class="section-label contact-label">
      CONTACT
      <span class="section-sub">問い合わせフォーム</span>
    </div>

    <form id="contactForm" class="contact-form">
      <label>
        Name
        <input type="text" name="name" required>
      </label>

      <label>
        Email
        <input type="email" name="_replyto" required>
      </label>

      <label>
        Message
        <textarea name="message" rows="6" required></textarea>
      </label>

      <button type="submit">Send</button>
    </form>

    <div id="formMessage">Thank you! Your message has been sent.</div>
  </div>
</section>

<footer>
  <div>© <span id="year"></span> Dolce-Rhea</div>
</footer>

<script src="js/script.js"></script>
</body>
</html>
